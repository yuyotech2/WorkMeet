<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Google Account | Exo Pulsar</title>
    <style>
        :root {
            --g-blue: #4285f4;
            --g-red: #ea4335;
            --g-yellow: #fbbc05;
            --g-green: #34a853;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #1e293b;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .pulsar-logo {
            width: 40px; height: 40px;
            background: #0f172a;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 1.2rem;
        }
        .link-icon {
            font-size: 1.5rem; color: #cbd5e1;
        }
        .google-logo { width: 35px; }
        
        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 30px; }

        .auth-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }
        .auth-card:hover {
            background: #e2e8f0;
            border-color: var(--g-blue);
        }
        .avatar {
            width: 45px; height: 45px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #1e293b;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        .btn-continue {
            width: 100%;
            padding: 16px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #1e293b;
        }

        .success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .check {
            width: 80px; height: 80px;
            background: var(--g-green);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <div class="pulsar-logo">E</div>
            <div class="link-icon">⇄</div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\"G\"_Logo.svg" class="google-logo">
        </div>
        <h1>Link your Workspace</h1>
        <p>Authorize <strong>Exo Pulsar</strong> to access your Google Calendar to sync your global academic schedule.</p>
        
        <div class="auth-card" onclick="startLink()">
            <div class="avatar">U</div>
            <div>
                <div style="font-weight: 800; font-size: 1rem;">Continue as User</div>
                <div style="font-size: 0.8rem; color: #64748b;">user@gmail.com</div>
            </div>
        </div>

        <button class="btn-continue" onclick="startLink()">Confirm Account Link</button>
        
        <div style="margin-top: 25px; font-size: 0.75rem; color: #94a3b8;">
            By continuing, Google will share your name, email, and calendar with Exo Pulsar.
        </div>
    </div>

    <div class="success-overlay" id="success">
        <div class="check">✓</div>
        <h2 style="font-weight: 800;">Connection Encrypted!</h2>
        <p>Returning you to the Nexus Dashboard...</p>
    </div>

    <script>
        function startLink() {
            document.getElementById('success').style.display = 'flex';
            setTimeout(() => {
                // Return to dashboard with a success flag
                window.location.href = 'dashboard.html?sync=success';
            }, 2500);
        }
    </script>
</body>
</html>
