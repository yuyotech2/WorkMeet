<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', arial, sans-serif;
            background: #131314;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #e3e3e3;
        }
        .login-card {
            background: #1e1f20;
            width: 100%;
            max-width: 1024px;
            min-height: 400px;
            padding: 48px;
            border-radius: 28px;
            display: flex;
            gap: 48px;
        }
        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .right-col {
            flex: 1.2;
            padding-top: 10px;
        }
        .g-logo {
            width: 32px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 36px;
            font-weight: 400;
            margin: 0 0 12px 0;
        }
        .account-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #444746;
            cursor: pointer;
            transition: background 0.2s;
        }
        .account-item:hover {
            background: rgba(255,255,255,0.04);
        }
        .avatar {
            width: 32px;
            height: 32px;
            background: #c51162;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            margin-right: 12px;
        }
        .acc-info {
            flex-grow: 1;
        }
        .acc-name {
            font-size: 14px;
            font-weight: 500;
            color: #e3e3e3;
        }
        .acc-email {
            font-size: 12px;
            color: #c4c7c5;
        }
        .signed-out {
            font-size: 12px;
            color: #c4c7c5;
        }
        .other-action {
            display: flex;
            align-items: center;
            padding: 16px 0;
            cursor: pointer;
            color: #e3e3e3;
            font-size: 14px;
            font-weight: 500;
        }
        .icon {
            margin-right: 12px;
            width: 20px;
            display: flex;
            justify-content: center;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #131314;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #7cacf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="left-col">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_Logo.svg" class="g-logo">
            <h1>Choose an account</h1>
        </div>
        <div class="right-col">
            <div class="account-item" onclick="confirmLink()">
                <div class="avatar">L</div>
                <div class="acc-info">
                    <div class="acc-name">Leonardo Lozano Andrade</div>
                    <div class="acc-email">trisanlo29@gmail.com</div>
                </div>
                <div class="signed-out">Signed out</div>
            </div>
            
            <div class="other-action">
                <div class="icon">👤</div>
                Use another account
            </div>
            
            <div class="other-action" style="border-top: 1px solid #444746; margin-top: 4px; padding-top: 20px;">
                <div class="icon">👤-</div>
                Remove an account
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-size: 14px; color: #c4c7c5;">Linking to Exo Pulsar...</p>
    </div>

    <script>
        function confirmLink() {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                window.location.href = 'dashboard.html?sync=success';
            }, 2000);
        }
    </script>
</body>
</html>
