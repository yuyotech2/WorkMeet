<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER DASHBOARD v2.0 | Workmeet</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .v2-status-bar {
            background: #ef4444;
            color: white;
            padding: 8px 0;
            text-align: center;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="v2-status-bar">🚀 WORKMEET V2.0 - MASTER ENGINE ACTIVE 🚀</div>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo" style="text-align: center; padding: 1rem;">
                <img src="assets/logo.png" alt="Logo" style="height: 100px; width: auto; border-radius: 20px; margin-bottom: 2rem;">
            </div>
            <div class="sidebar-section">
                <p class="sidebar-title">Manage</p>
                <a href="#" class="sidebar-item active" id="btn-meetings" onclick="showView('meetings')">Meeting Hub</a>
                <a href="#" class="sidebar-item" id="btn-calendar" onclick="showView('calendar')">Full Calendar</a>
            </div>
        </aside>

        <main class="meeting-content">
            <header class="top-bar" style="height: 100px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; background: #fff;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="live-indicator"></div>
                    <span class="version-label">v2.0</span>
                    <h2 id="room-display" style="margin: 0; font-size: 1.4rem;">Private Room</h2>
                </div>
                <div style="display: flex; align-items: center; gap: 2rem;">
                    <button class="btn btn-primary" onclick="copyLink()" style="padding: 10px 20px; border-radius: 12px; font-weight: 800;">INVITE</button>
                    <div style="width: 45px; height: 45px; border-radius: 15px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800;">T</div>
                </div>
            </header>

            <div class="scroll-area">
                <!-- Meetings Content -->
                <section id="meetings-view" style="padding: 3rem;">
                    <div class="participant-box" style="height: 400px; background: #f8fafc; border-radius: 30px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        <video id="user-video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
                        <div id="camera-off-overlay" style="position: absolute; text-align: center; color: #94a3b8;">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                            <h3 style="margin-top: 1rem;">Camera is OFF</h3>
                        </div>
                        <div class="participant-name">You (Host)</div>
                    </div>
                </section>

                <!-- Calendar View (Fixed Grid) -->
                <section id="calendar-view" class="hidden" style="padding: 3rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
                        <h2 style="margin: 0;">Full Planning Grid</h2>
                        <button class="btn btn-primary" onclick="openCreateModal()">+ Create New</button>
                    </div>
                    <div class="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; border-radius: 20px; overflow: hidden;">
                        <div class="calendar-day" onclick="openCreateModal(this)"><div class="day-num">18</div></div>
                        <div class="calendar-day" onclick="openCreateModal(this)"><div class="day-num today" id="today-cell">19</div></div>
                        <div class="calendar-day" onclick="openCreateModal(this)"><div class="day-num">20</div></div>
                        <div class="calendar-day" onclick="openCreateModal(this)"><div class="day-num">21</div></div>
                        <div class="calendar-day" onclick="openCreateModal(this)"><div class="day-num">22</div></div>
                    </div>
                </section>
            </div>

            <!-- Footer Controls -->
            <footer class="controls-bar" style="height: 100px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 2rem;">
                <button class="control-btn" id="btn-mic" onclick="toggleMic()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button class="control-btn" id="btn-video" onclick="toggleCamera()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                </button>
                <button class="control-btn" title="Chat" onclick="toggleChat()" id="btn-chat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </button>
                <button class="control-btn leave" onclick="window.location.href='index.html'">Leave</button>
            </footer>
        </main>

        <!-- Chat Panel -->
        <aside class="chat-panel hidden" id="chat-panel">
            <header class="chat-header"><h3>Chat</h3></header>
            <div class="chat-messages" id="chat-messages"></div>
            <footer class="chat-footer">
                <input type="text" id="chat-input" placeholder="Type..." onkeypress="if(event.key === 'Enter') sendMessage()">
            </footer>
        </aside>
    </div>

    <!-- Planning Modal -->
    <div class="modal-overlay hidden" id="modal">
        <div class="modal-content">
            <h3>Plan a Meet</h3>
            <div class="form-group"><input type="text" class="form-input" placeholder="Title" id="meet-title"></div>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="document.getElementById('modal').classList.add('hidden'); alert('Closed Successfully!')">Cancel</button>
                <button class="modal-btn" style="flex: 1;" onclick="saveMeeting()">Save</button>
            </div>
        </div>
    </div>

    <!-- Script Master -->
    <script>
        let selectedDateCell = null;
        let isCameraOn = false;
        let isMicOn = false;

        function showView(v) {
            document.getElementById('meetings-view').classList.add('hidden');
            document.getElementById('calendar-view').classList.add('hidden');
            document.getElementById(v + '-view').classList.remove('hidden');
        }

        function openCreateModal(cell) {
            selectedDateCell = cell || document.getElementById('today-cell').parentElement;
            document.getElementById('modal').classList.remove('hidden');
        }

        function saveMeeting() {
            try {
                const title = document.getElementById('meet-title').value.trim();
                if(!title) return alert("Title please");
                if(selectedDateCell) {
                    const ev = document.createElement('div');
                    ev.className = 'calendar-event';
                    ev.innerText = '14:00 - ' + title;
                    selectedDateCell.appendChild(ev);
                    document.getElementById('modal').classList.add('hidden');
                    showView('calendar');
                    alert("Meeting Saved & Sent! ✅");
                }
            } catch(e) { alert("Save Error: " + e.message); }
        }

        function toggleChat() { document.getElementById('chat-panel').classList.toggle('hidden'); }
        function sendMessage() {
            const i = document.getElementById('chat-input');
            const txt = i.value.trim();
            if(!txt) return;
            const m = document.getElementById('chat-messages');
            const d = document.createElement('div');
            d.className = 'message you';
            d.innerText = txt;
            m.appendChild(d);
            i.value = '';
        }

        async function toggleCamera() {
            const v = document.getElementById('user-video');
            const o = document.getElementById('camera-off-overlay');
            if(isCameraOn) {
                isCameraOn = false; o.style.display = 'flex'; v.srcObject = null;
            } else {
                try {
                const s = await navigator.mediaDevices.getUserMedia({video: true});
                v.srcObject = s; isCameraOn = true; o.style.display = 'none';
                } catch(e) { alert("Camera issue: " + e.message); }
            }
        }
        function toggleMic() { isMicOn = !isMicOn; document.getElementById('btn-mic').classList.toggle('sharing'); }
    </script>
</body>
</html>
