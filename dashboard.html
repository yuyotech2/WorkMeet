<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXO PULSAR | Advanced Nexus Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { cursor: url('https://cdn-icons-png.flaticon.com/32/10771/10771239.png'), auto; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #vortex-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* Sidebar Architecture */
        .nexus-sidebar {
            width: 90px; height: 100vh; background: var(--glass);
            backdrop-filter: blur(30px); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 35px;
            position: fixed; left: 0; top: 0; z-index: 100;
        }

        .nav-btn {
            width: 55px; height: 55px; border-radius: 18px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.4);
            font-size: 1.5rem;
        }

        .nav-btn:hover { background: rgba(59, 130, 246, 0.1); color: white; transform: scale(1.1) rotate(5deg); }
        .nav-btn.active { 
            background: var(--accent); color: white; 
            box-shadow: 0 0 30px var(--accent-glow);
            border-color: rgba(255,255,255,0.3);
        }

        /* Mission Header */
        .nexus-header {
            position: fixed; top: 0; left: 90px; right: 0; height: 85px;
            background: rgba(2, 6, 23, 0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; padding: 0 45px;
            z-index: 90;
        }

        .header-logo { display:flex; align-items:center; gap:18px; }
        .logo-box { width: 45px; height: 45px; background: var(--accent); border-radius: 12px; display:flex; align-items:center; justify-content:center; font-weight:900; box-shadow: 0 0 20px var(--accent-glow); }
        
        /* Whiteboard Space */
        .workspace-stage {
            margin-left: 90px; margin-top: 85px; height: calc(100vh - 85px);
            position: relative; overflow: hidden;
        }
        #canvas { cursor: crosshair; touch-action: none; pointer-events: all; }

        /* Tools HUD */
        .tools-hud {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95); border: 1px solid var(--border);
            padding: 12px 30px; border-radius: 30px; display: flex; gap: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            z-index: 200;
        }
        .tool-icon { width: 50px; height: 50px; display:flex; align-items:center; justify-content:center; cursor: pointer; border-radius: 14px; transition: 0.3s; font-size: 1.2rem; }
        .tool-icon.active { background: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .tool-icon:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }

        /* Calendar Nexus Side-Panel */
        .calendar-nexus {
            position: fixed; right: -480px; top: 0; width: 480px; height: 100vh;
            background: var(--glass); backdrop-filter: blur(40px);
            border-left: 1px solid var(--border); z-index: 500;
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            display: flex; flex-direction: column;
        }
        .calendar-nexus.open { right: 0; box-shadow: -40px 0 100px rgba(0,0,0,0.7); }

        .cal-grid { 
            flex: 1; overflow-y: auto; padding: 35px;
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px;
        }
        .day-cell {
            aspect-ratio: 1; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.02);
            font-weight: 600; font-size: 1rem;
        }
        .day-cell:hover { background: rgba(59, 130, 246, 0.15); border-color: var(--accent); transform: scale(1.08); }
        .day-cell.today { background: var(--accent); color: white; box-shadow: 0 0 25px var(--accent-glow); border: none; }
        .event-blink { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: absolute; bottom: 10px; }

        /* Meeting Portal Overlay */
        .portal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .portal-modal {
            background: #0f172a; border: 1px solid var(--border);
            width: 480px; padding: 45px; border-radius: 40px;
            box-shadow: 0 50px 150px rgba(0,0,0,1); text-align: center;
        }
        .meeting-line {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .sync-chip {
            background: white; color: black; padding: 6px 12px; border-radius: 10px;
            font-size: 0.7rem; font-weight: 800; cursor: pointer; transition: 0.2s;
            display:flex; align-items:center; gap:6px;
        }
        .sync-chip:hover { transform: scale(1.1); box-shadow: 0 0 20px white; }

        /* Typography & Inputs */
        h1, h2, h3 { letter-spacing: -2px; }
        input { 
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: white; font-family: inherit; margin-bottom: 15px;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .btn-portal {
            background: var(--accent); color: white; border: none; padding: 20px;
            border-radius: 18px; font-weight: 800; text-transform: uppercase;
            width: 100%; cursor: pointer; letter-spacing: 3px; margin-top: 15px;
        }
    </style>
</head>
<body>
    <canvas id="vortex-bg"></canvas>

    <div class="exo-nexus">
        <aside class="nexus-sidebar">
            <div class="logo-box">EX</div>
            <div class="nav-btn active" title="Neural Whiteboard">🖌️</div>
            <div class="nav-btn" onclick="toggleNexusCal()" title="Global Calendar">📅</div>
            <div class="nav-btn">🔗</div>
            <div class="nav-btn" onclick="wipeLocalCore()" style="margin-top: auto; color: #ef4444;">💀</div>
        </aside>

        <header class="nexus-header">
            <div class="header-logo">
                <h1 style="margin:0; font-size: 2rem;">EXO PULSAR <span style="font-weight: 200; color: #64748b;">NEXUS</span></h1>
            </div>
            <div style="display: flex; align-items:center; gap: 30px;">
                <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent); padding: 8px 18px; border-radius: 30px; font-size: 0.8rem; font-weight: 800; color: var(--accent); letter-spacing: 1.5px;">MISSION ACTIVE</div>
                <div id="nexus-clock" style="font-family: 'JetBrains Mono'; font-weight: 700; font-size: 1.3rem;">00:00:00</div>
            </div>
        </header>

        <main class="workspace-stage">
            <div id="whiteboard-container" style="width: 100%; height: 100%;">
                <canvas id="canvas"></canvas>
                
                <div class="tools-hud">
                    <div class="tool-icon active" id="tool-pen" onclick="setTool('pen')">🖌️</div>
                    <div class="tool-icon" id="tool-eraser" onclick="setTool('eraser')">🧼</div>
                    <div class="tool-icon" onclick="clearSlate()">🗑️</div>
                    <input type="color" id="nexus-color" value="#3b82f6" style="width: 40px; height: 50px; border: none; background: none; cursor: pointer;">
                </div>
            </div>

            <!-- Calendar Nexus -->
            <div id="nexus-calendar" class="calendar-nexus">
                <div style="padding: 50px 40px;">
                    <h2 style="margin:0; font-size: 2.2rem;">CALENDAR NEXUS</h2>
                    <p style="color: #64748b; font-weight: 500;">Dimensional scheduling protocol.</p>
                </div>
                <div style="padding: 0 40px 20px; display:flex; justify-content:space-between; align-items:center;">
                    <h3 id="nexus-month-name" style="margin: 0; color: var(--accent); font-weight: 800; letter-spacing: normal;">OCTOBER 2024</h3>
                    <div style="display:flex; gap: 15px;">
                        <button onclick="shiftMonth(-1)" style="background: none; border: 1px solid var(--border); color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer;">←</button>
                        <button onclick="shiftMonth(1)" style="background: none; border: 1px solid var(--border); color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer;">→</button>
                    </div>
                </div>
                <div id="nexus-cal-grid" class="cal-grid"></div>
            </div>
        </main>
    </div>

    <!-- Portal Modal -->
    <div id="nexus-portal" class="portal-overlay">
        <div class="portal-modal">
            <h2 id="portal-date" style="margin-top: 0; font-size: 2.5rem; color: var(--accent);">OCT 14</h2>
            <div id="portal-event-list" style="margin: 30px 0; max-height: 250px; overflow-y: auto; padding: 10px;"></div>
            
            <div style="border-top: 1px solid var(--border); padding-top: 30px;">
                <input type="text" id="ev-name" placeholder="Protocol Name / Meeting Subject">
                <input type="time" id="ev-time">
                <button class="btn-portal" onclick="initializeEvent()">Launch Protocol</button>
                <button onclick="closeNexusPortal()" style="background:none; border:none; color: #64748b; margin-top:20px; cursor:pointer; font-weight:700;">ABORT PORTAL</button>
            </div>
        </div>
    </div>

    <script>
        let drawState = false;
        let activeTool = 'pen';
        let calMonth = new Date().getMonth();
        let calYear = new Date().getFullYear();
        let currentKey = '';
        let eventVault = JSON.parse(localStorage.getItem('exo_nexus_events')) || {};
        let canvas, ctx, vortex;

        // --- CORE BOOTUP ---
        function initExoPulsar() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            resizeStage();
            initVortex();
            window.onresize = resizeStage;

            // DRAWING HANDLES
            canvas.onmousedown = (e) => { drawState = true; ctx.beginPath(); ctx.moveTo(e.clientX - 90, e.clientY - 85); };
            canvas.onmousemove = performAction;
            canvas.onmouseup = () => { drawState = false; saveArtToVault(); };
            canvas.onmouseleave = () => drawState = false;

            // LOAD ART
            const savedArt = localStorage.getItem('exo_nexus_drawing');
            if(savedArt) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = savedArt;
            }

            renderNexusLayout();
            setInterval(updateClock, 1000);
        }

        function resizeStage() {
            const data = canvas.toDataURL();
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data;
        }

        function performAction(e) {
            if(!drawState) return;
            ctx.strokeStyle = activeTool === 'eraser' ? '#020617' : document.getElementById('nexus-color').value;
            ctx.lineWidth = activeTool === 'eraser' ? 60 : 3;
            ctx.lineCap = 'round';
            ctx.lineTo(e.clientX - 90, e.clientY - 85);
            ctx.stroke();
        }

        function setTool(t) {
            activeTool = t;
            document.querySelectorAll('.tool-icon').forEach(el => el.classList.remove('active'));
            document.getElementById(`tool-${t}`).classList.add('active');
        }

        function clearSlate() { ctx.clearRect(0,0, canvas.width, canvas.height); saveArtToVault(); }
        function saveArtToVault() { localStorage.setItem('exo_nexus_drawing', canvas.toDataURL()); }

        // --- CALENDAR NEXUS ---
        function toggleNexusCal() { document.getElementById('nexus-calendar').classList.toggle('open'); }
        function shiftMonth(d) {
            calMonth += d;
            if(calMonth > 11) { calMonth = 0; calYear++; }
            if(calMonth < 0) { calMonth = 11; calYear--; }
            renderNexusLayout();
        }

        function renderNexusLayout() {
            const grid = document.getElementById('nexus-cal-grid');
            const months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            document.getElementById('nexus-month-name').innerText = `${months[calMonth]} ${calYear}`;
            
            grid.innerHTML = '';
            const first = new Date(calYear, calMonth, 1).getDay();
            const days = new Date(calYear, calMonth + 1, 0).getDate();
            
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            
            for(let i=1; i<=days; i++) {
                const key = `${calYear}-${calMonth}-${i}`;
                const hasEvent = eventVault[key] && eventVault[key].length > 0;
                const isToday = (i === new Date().getDate() && calMonth === new Date().getMonth() && calYear === new Date().getFullYear());
                
                grid.innerHTML += `
                    <div class="day-cell ${isToday ? 'today' : ''}" onclick="openPortal('${key}')">
                        ${i}
                        ${hasEvent ? '<div class="event-blink"></div>' : ''}
                    </div>
                `;
            }
        }

        function openPortal(key) {
            currentKey = key;
            const [y, m, d] = key.split('-');
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            document.getElementById('portal-date').innerText = `${months[m]} ${d}`;
            
            const list = document.getElementById('portal-event-list');
            list.innerHTML = '';
            
            if(eventVault[key]) {
                eventVault[key].forEach(ev => {
                    list.innerHTML += `
                        <div class="meeting-line">
                            <div style="text-align:left;">
                                <div style="font-weight: 800; font-size: 1.2rem;">${ev.topic}</div>
                                <div style="color: #64748b; font-weight: 600;">${ev.time}</div>
                            </div>
                            <div class="sync-chip" onclick="executeGoogleHandshake('${ev.topic}', '${key}', '${ev.time}')">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" width="16"> SYNC
                            </div>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = `<p style="opacity:0.3; font-style:italic;">DIMENSIONAL VOID: NO PROTOCOLS LOGGED</p>`;
            }
            document.getElementById('nexus-portal').style.display = 'flex';
        }

        function closeNexusPortal() { document.getElementById('nexus-portal').style.display = 'none'; }

        function initializeEvent() {
            const topic = document.getElementById('ev-name').value;
            const time = document.getElementById('ev-time').value;
            if(!topic || !time) return;

            if(!eventVault[currentKey]) eventVault[currentKey] = [];
            eventVault[currentKey].push({ topic, time });
            localStorage.setItem('exo_nexus_events', JSON.stringify(eventVault));
            
            renderNexusLayout();
            setTimeout(() => {
                if(confirm("Protocol Logged. Synchronize to Global Google Nexus?")) {
                    executeGoogleHandshake(topic, currentKey, time);
                }
            }, 100);
            openPortal(currentKey);
        }

        function executeGoogleHandshake(subject, key, time) {
            const [y, m, d] = key.split('-');
            const mm = String(Number(m)+1).padStart(2,'0');
            const dd = String(d).padStart(2,'0');
            const tt = time.replace(':','');
            
            const start = `${y}${mm}${dd}T${tt}00Z`;
            const end = `${y}${mm}${dd}T${String(Number(time.split(':')[0])+1).padStart(2,'0')}${time.split(':')[1]}00Z`;
            
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(subject)}&dates=${start}/${end}&details=Synced via Exo-Pulsar Nexus Dashboard`;
            window.open(url, '_blank');
        }

        // --- VORTEX PARTICLES ---
        function initVortex() {
            vortex = document.getElementById('vortex-bg');
            const vctx = vortex.getContext('2d');
            vortex.width = window.innerWidth;
            vortex.height = window.innerHeight;
            
            let stars = Array.from({length: 150}, () => ({
                x: Math.random() * vortex.width,
                y: Math.random() * vortex.height,
                z: Math.random() * vortex.width,
                o: Math.random()
            }));

            function animate() {
                vctx.fillStyle = '#020617';
                vctx.fillRect(0,0,vortex.width, vortex.height);
                
                stars.forEach(s => {
                    s.z -= 0.5;
                    if(s.z <= 0) s.z = vortex.width;
                    const x = (s.x - vortex.width/2) * (vortex.width / s.z) + vortex.width/2;
                    const y = (s.y - vortex.height/2) * (vortex.width / s.z) + vortex.height/2;
                    const radius = (vortex.width / s.z) * 0.5;
                    
                    vctx.beginPath();
                    vctx.arc(x, y, radius, 0, Math.PI*2);
                    vctx.fillStyle = `rgba(59, 130, 246, ${s.o})`;
                    vctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function updateClock() { document.getElementById('nexus-clock').innerText = new Date().toLocaleTimeString(); }
        function wipeLocalCore() { if(confirm("INITIATE TOTAL CORE DATA WIPE?")) { localStorage.clear(); location.reload(); } }

        window.onload = initExoPulsar;
    </script>
</body>
</html>
