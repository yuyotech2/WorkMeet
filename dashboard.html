<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exo-Pulsar | Productivity Hub</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
        .app-container { display: flex; width: 100%; height: 100vh; background: #f1f5f9; font-family: 'Outfit', sans-serif; }
        .sidebar { width: 250px; background: white; padding: 25px; border-right: 1px solid #e2e8f0; }
        .main-content { flex: 1; padding: 40px; }
        .p-box { height: 350px; background: #e2e8f0; border-radius: 40px; }
        .waiting { background: white; border: 2px dashed #cbd5e1; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2 style="color: #008291; font-weight: 800;">Exo-Pulsar</h2>
            <div style="margin-top: 30px;">
                <div style="padding: 12px; background: #f1f5f9; border-radius: 12px; margin-bottom: 10px; font-weight: 700;">🎥 Meeting Hub</div>
                <div style="padding: 12px; color: #64748b; font-weight: 600;">📅 Full Calendar</div>
            </div>
        </aside>
        <main class="main-content">
            <h1 style="font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -2px;">Production Hub Meeting</h1>
            <p style="color: #64748b; font-weight: 600;">RESTORED SESSION | LIVE</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px;">
                <div class="p-box"></div>
                <div class="p-box waiting">
                    <h3 style="color: #94a3b8;">Waiting for Pulse...</h3>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
