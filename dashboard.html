<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER DASHBOARD | Workmeet</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo" style="text-align: center; padding: 1rem; position: relative;">
                <img src="assets/logo.png" alt="Logo" style="height: 100px; width: auto; border-radius: 20px; margin-bottom: 2rem;">
                <div style="position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 0.7rem;">v3.0 - WHITEBOARD</div>
            </div>
            <div class="sidebar-section">
                <p class="sidebar-title">Manage</p>
                <a href="#" class="sidebar-item active" id="btn-meetings">Meeting Hub</a>
            </div>
            <div class="sidebar-section">
                <p class="sidebar-title">Spaces</p>
                <a href="#" class="sidebar-item" id="btn-whiteboard" onclick="showView('whiteboard')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg>
                    Class Whiteboard
                </a>
            </div>
            <div class="sidebar-section" style="margin-top: auto;">
                <a href="index.html" class="sidebar-item">Leave Workspace</a>
            </div>
        </aside>

        <main class="meeting-content">
            <header class="top-bar" style="height: 100px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; background: #fff;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="live-indicator"></div>
                    <h2 id="room-display" style="margin: 0; font-size: 1.4rem;">Private Room</h2>
                </div>
                <div style="display: flex; align-items: center; gap: 2rem;">
                    <button class="btn btn-primary" onclick="copyLink()" style="padding: 10px 20px; border-radius: 12px; font-weight: 800;">INVITE</button>
                    <div style="width: 45px; height: 45px; border-radius: 15px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800;">T</div>
                </div>
            </header>

            <div class="scroll-area">
                <!-- Meetings Content -->
                <section id="meetings-view" style="padding: 3rem;">
                    <div class="participant-box" style="height: 400px; background: #f8fafc; border-radius: 30px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        <video id="user-video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
                        <div id="camera-off-overlay" style="position: absolute; text-align: center; color: #94a3b8;">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                            <h3 style="margin-top: 1rem;">Camera is OFF</h3>
                        </div>
                        <div class="participant-name">You (Host)</div>
                    </div>
                </section>

                <!-- Whiteboard Section (Drawable!) -->
                <section id="whiteboard-view" class="hidden" style="padding: 3rem; height: 100%;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <h2 style="margin: 0;">Interactive Whiteboard</h2>
                        <button class="btn btn-secondary" onclick="clearBoard()" style="width: auto; padding: 0.5rem 1.5rem;">Clear Board</button>
                    </div>
                    <div style="background: white; border-radius: 30px; border: 2px solid #e2e8f0; height: 600px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); overflow: hidden;">
                        <canvas id="whiteboard" style="width: 100%; height: 100%; cursor: crosshair;"></canvas>
                    </div>
                </section>

            </div>

            <!-- Footer Controls -->
            <footer class="controls-bar" style="height: 100px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 2rem;">
                <button class="control-btn" id="btn-mic" onclick="toggleMic()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button class="control-btn" id="btn-video" onclick="toggleCamera()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                </button>
                <button class="control-btn" id="btn-share" onclick="toggleScreenShare()" title="Share Screen">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                </button>
                <button class="control-btn" title="Chat" onclick="toggleChat()" id="btn-chat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </button>
                <button class="control-btn leave" onclick="window.location.href='index.html'">Leave</button>
            </footer>
        </main>

        <!-- Chat Panel -->
        <aside class="chat-panel hidden" id="chat-panel">
            <header class="chat-header"><h3>Chat</h3></header>
            <div class="chat-messages" id="chat-messages"></div>
            <footer class="chat-footer">
                <input type="text" id="chat-input" placeholder="Type..." onkeypress="if(event.key === 'Enter') sendMessage()">
            </footer>
        </aside>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room') || 'Private Room';
        document.getElementById('room-display').innerText = roomName;

        let isCameraOn = false;
        let isMicOn = false;

        function showView(v) {
            console.log("Switching to: " + v);
            if(v === 'whiteboard') alert("Digital Whiteboard Engine Initializing... ✅");
            
            // Hide all views safely
            const views = ['meetings', 'whiteboard'];
            views.forEach(view => {
                const el = document.getElementById(view + '-view');
                if(el) el.classList.add('hidden');
                const btn = document.getElementById('btn-' + view);
                if(btn) btn.classList.remove('active');
            });
            
            // Show target view
            const target = document.getElementById(v + '-view');
            if(target) target.classList.remove('hidden');
            const targetBtn = document.getElementById('btn-' + v);
            if(targetBtn) targetBtn.classList.add('active');
            
            if(v === 'whiteboard') initWhiteboard();
        }

        // --- WHITEBOARD BRAIN ---
        let drawing = false;
        function initWhiteboard() {
            const canvas = document.getElementById('whiteboard');
            const ctx = canvas.getContext('2d');
            
            // Force Canvas to fill its container
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#0f172a';

            canvas.onmousedown = () => drawing = true;
            canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
            canvas.onmousemove = (e) => {
                if(!drawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            };
        }
        function clearBoard() {
            const canvas = document.getElementById('whiteboard');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function copyLink() {
            try {
                const room = document.getElementById('room-display').innerText;
                const url = window.location.href.split('?')[0] + '?room=' + encodeURIComponent(room);
                navigator.clipboard.writeText(url);
                alert("Invite Link Copied: " + url);
            } catch(e) { alert("Copy Error: " + e.message); }
        }

        function toggleChat() { document.getElementById('chat-panel').classList.toggle('hidden'); }
        function sendMessage() {
            const i = document.getElementById('chat-input');
            const txt = i.value.trim();
            if(!txt) return;
            const m = document.getElementById('chat-messages');
            const d = document.createElement('div');
            d.className = 'message you';
            d.innerText = txt;
            m.appendChild(d);
            i.value = '';
        }

        async function toggleScreenShare() {
            try {
                const s = await navigator.mediaDevices.getDisplayMedia({video: true});
                const v = document.getElementById('user-video');
                v.srcObject = s;
                document.getElementById('btn-share').classList.toggle('sharing');
                alert("Screen Sharing Active! ✅");
            } catch(e) { alert("Sharing Error: " + e.message); }
        }

        async function toggleCamera() {
            const v = document.getElementById('user-video');
            const o = document.getElementById('camera-off-overlay');
            if(isCameraOn) {
                isCameraOn = false; o.style.display = 'flex'; v.srcObject = null;
            } else {
                try {
                const s = await navigator.mediaDevices.getUserMedia({video: true});
                v.srcObject = s; isCameraOn = true; o.style.display = 'none';
                } catch(e) { alert("Camera issue: " + e.message); }
            }
        }
        function toggleMic() { isMicOn = !isMicOn; document.getElementById('btn-mic').classList.toggle('sharing'); }
    </script>
</body>
</html>
