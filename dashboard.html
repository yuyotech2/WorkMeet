<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exo Pulsar | Nexus Workspace</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400..800&family=Inter:wght@400..800&family=JetBrains+Mono:wght@400..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --neon-blue: #3b82f6;
            --neon-glow: rgba(59, 130, 246, 0.4);
            --glass-bg: rgba(15, 23, 42, 0.85);
            --border-glow: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif;
            background: #020617;
            overflow: hidden;
            color: #f8fafc;
        }

        #particle-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        .main-nexus {
            display: flex; width: 100vw; height: 100vh;
        }

        /* Side Navigation */
        .sidebar {
            width: 85px; background: var(--glass-bg);
            backdrop-filter: blur(25px); display: flex; flex-direction: column;
            align-items: center; padding: 25px 0; gap: 30px;
            border-right: 1px solid var(--border-glow);
            z-index: 50;
        }

        .nav-item {
            width: 50px; height: 50px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: rgba(255,255,255,0.4); border: 1px solid transparent;
            font-size: 1.4rem;
        }

        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); transform: translateY(-3px); }
        .nav-item.active { 
            background: var(--neon-blue); color: white; 
            box-shadow: 0 0 25px var(--neon-glow);
            border-color: rgba(255,255,255,0.2);
        }

        /* Content Stage */
        .stage { flex: 1; position: relative; display: flex; flex-direction: column; }

        .nexus-header {
            height: 80px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; background: rgba(2, 6, 23, 0.5); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glow); z-index: 10;
        }

        .status-pill {
            background: rgba(59, 130, 246, 0.1); border: 1px solid var(--neon-blue);
            padding: 6px 16px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 700; color: var(--neon-blue); letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }

        .pulse { width: 8px; height: 8px; background: var(--neon-blue); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* Whiteboard */
        #whiteboard-container { flex: 1; position: relative; background: transparent; overflow: hidden; }
        #canvas { cursor: url('https://cdn-icons-png.flaticon.com/32/588/588395.png'), auto; }

        /* Calendar Sidebar */
        .calendar-side {
            width: 420px; background: var(--glass-bg); backdrop-filter: blur(40px);
            border-left: 1px solid var(--border-glow); height: 100%; display: flex; flex-direction: column;
            position: absolute; right: -420px; transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1); z-index: 100;
        }
        .calendar-side.active { right: 0; box-shadow: -30px 0 60px rgba(0,0,0,0.5); }

        .cal-head { padding: 40px; border-bottom: 1px solid var(--border-glow); }
        .cal-grid { 
            flex: 1; overflow-y: auto; padding: 25px; 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px;
        }
        
        .day {
            aspect-ratio: 1; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.3s; background: rgba(255,255,255,0.02);
            font-size: 0.9rem; font-weight: 500;
        }
        .day:hover { background: rgba(59, 130, 246, 0.1); border-color: var(--neon-blue); transform: scale(1.05); }
        .day.today { background: var(--neon-blue); border: none; font-weight: 900; box-shadow: 0 0 20px var(--neon-glow); }
        
        .dot { width: 5px; height: 5px; background: var(--neon-blue); border-radius: 50%; position: absolute; bottom: 8px; }

        /* Meeting Modal */
        .nexus-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1); 
            width: 440px; padding: 35px; border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 2000;
            display: none; opacity: 0; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .nexus-modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .meeting-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 16px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .google-sync-chip {
            background: #ffffff; color: #0f172a; padding: 4px 10px; border-radius: 8px;
            font-size: 0.65rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: 0.2s;
        }
        .google-sync-chip:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        /* Tools Hub */
        .tools-hub {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 25px; display: flex; gap: 20px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 50;
        }
        .tool { width: 45px; height: 45px; display:flex; align-items:center; justify-content:center; color: white; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tool:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }
        .tool.active { background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-glow); }

        input[type="text"], input[type="time"] {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 15px; width: 100%; box-sizing: border-box;
            outline: none; transition: 0.3s; margin-bottom: 12px;
        }
        input:focus { border-color: var(--neon-blue); background: rgba(255,255,255,0.08); }

        .btn-launch {
            background: var(--neon-blue); color: white; border: none; padding: 18px; border-radius: 15px;
            font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 10px 25px var(--neon-glow); transition: 0.3s;
        }
        .btn-launch:hover { transform: translateY(-3px); box-shadow: 0 15px 35px var(--neon-glow); }
    </style>
</head>
<body>
    <div id="particle-bg"></div>

    <div class="main-nexus">
        <nav class="sidebar">
            <div class="nav-item active" onclick="setMode('draw')">📁</div>
            <div class="nav-item" onclick="toggleCalendar()">📅</div>
            <div class="nav-item">🛡️</div>
            <div class="nav-item" onclick="resetSystem()" style="margin-top: auto; color: #ef4444;">💀</div>
        </nav>

        <main class="stage">
            <header class="nexus-header">
                <div>
                    <h1 style="margin: 0; font-weight: 800; letter-spacing: -2px; font-size: 1.8rem;">EXO PULSAR <span style="font-weight: 200; color: #64748b;">NEXUS</span></h1>
                </div>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="status-pill"><div class="pulse"></div> NEURAL LINK ACTIVE</div>
                    <div id="nexus-clock" style="font-family: 'JetBrains Mono'; font-weight: 500; font-size: 1.1rem;">00:00:00</div>
                </div>
            </header>

            <div id="whiteboard-container">
                <canvas id="canvas"></canvas>
                
                <div class="tools-hub">
                    <div class="tool active" id="tool-pen" onclick="switchTool('pen')">🖊️</div>
                    <div class="tool" id="tool-eraser" onclick="switchTool('eraser')">🧼</div>
                    <div class="tool" onclick="wipeCanvas()">🔋</div>
                    <input type="color" id="brush-color" value="#3b82f6" style="width: 35px; height: 35px; border-radius: 10px; border: none; background: none; cursor: pointer;">
                </div>
            </div>

            <!-- Global Calendar Panel -->
            <div id="calendar-tray" class="calendar-side">
                <div class="cal-head">
                    <h2 style="margin: 0; font-weight: 800; font-size: 1.6rem;">Global Nexus</h2>
                    <p style="color: #64748b; margin-top: 5px;">Link your events across dimensions.</p>
                </div>
                <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <h3 id="current-month" style="margin: 0; font-weight: 600;">OCTOBER 2024</h3>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="navMonth(-1)" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer;">←</button>
                        <button onclick="navMonth(1)" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer;">→</button>
                    </div>
                </div>
                <div id="cal-grid" class="cal-grid"></div>
            </div>
        </main>
    </div>

    <!-- Interface Modal -->
    <div id="nexus-modal" class="nexus-modal">
        <h2 id="modal-title" style="margin-top: 0; font-weight: 800;">Oct 14, 2024</h2>
        <div id="modal-meeting-list" style="margin-bottom: 25px;"></div>
        
        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
            <input type="text" id="mt-name" placeholder="Mission Name / Meeting Topic">
            <input type="time" id="mt-time">
            <button class="btn-launch" onclick="launchMeeting()">Initialize Meeting</button>
            <button onclick="closeNexusModal()" style="background: none; border: none; color: #64748b; width: 100%; margin-top: 15px; cursor: pointer; font-weight: 600;">Exit Portal</button>
        </div>
    </div>

    <script>
        let isDrawing = false;
        let activeTool = 'pen';
        let viewMonth = new Date().getMonth();
        let viewYear = new Date().getFullYear();
        let selectedKey = '';
        let registry = JSON.parse(localStorage.getItem('exo_nexus_events')) || {};
        let canvas, ctx;

        // --- NEURAL WHITEBOARD ---
        function initNexus() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            resizeNexus();
            window.onresize = resizeNexus;

            canvas.onmousedown = startDraw;
            canvas.onmousemove = drawMove;
            canvas.onmouseup = stopDraw;
            canvas.onmouseleave = stopDraw;

            // Load saved art
            const saved = localStorage.getItem('exo_nexus_art');
            if(saved) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = saved;
            }

            renderNexusCal();
            setInterval(updateClock, 1000);
        }

        function resizeNexus() {
            const temp = canvas.toDataURL();
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = temp;
        }

        function startDraw(e) {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX - 85, e.clientY - 80);
        }

        function drawMove(e) {
            if(!isDrawing) return;
            ctx.strokeStyle = activeTool === 'eraser' ? '#020617' : document.getElementById('brush-color').value;
            ctx.lineWidth = activeTool === 'eraser' ? 50 : 3;
            ctx.lineCap = 'round';
            ctx.lineTo(e.clientX - 85, e.clientY - 80);
            ctx.stroke();
            localStorage.setItem('exo_nexus_art', canvas.toDataURL());
        }

        function stopDraw() { isDrawing = false; }
        function switchTool(t) { 
            activeTool = t; 
            document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
            document.getElementById(`tool-${t}`).classList.add('active');
        }
        function wipeCanvas() { ctx.clearRect(0,0, canvas.width, canvas.height); localStorage.removeItem('exo_nexus_art'); }

        // --- CALENDAR SYSTEM ---
        function toggleCalendar() { document.getElementById('calendar-tray').classList.toggle('active'); }
        function navMonth(d) {
            viewMonth += d;
            if(viewMonth > 11) { viewMonth = 0; viewYear++; }
            if(viewMonth < 0) { viewMonth = 11; viewYear--; }
            renderNexusCal();
        }

        function renderNexusCal() {
            const grid = document.getElementById('cal-grid');
            const months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            document.getElementById('current-month').innerText = `${months[viewMonth]} ${viewYear}`;
            
            grid.innerHTML = '';
            const first = new Date(viewYear, viewMonth, 1).getDay();
            const days = new Date(viewYear, viewMonth + 1, 0).getDate();
            
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            
            for(let i=1; i<=days; i++) {
                const key = `${viewYear}-${viewMonth}-${i}`;
                const hasE = registry[key] && registry[key].length > 0;
                const isT = (i === new Date().getDate() && viewMonth === new Date().getMonth() && viewYear === new Date().getFullYear());
                
                grid.innerHTML += `
                    <div class="day ${isT ? 'today' : ''}" onclick="openRegistry('${key}')">
                        ${i}
                        ${hasE ? '<div class="dot"></div>' : ''}
                    </div>
                `;
            }
        }

        function openRegistry(key) {
            selectedKey = key;
            const [y, m, d] = key.split('-');
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('modal-title').innerText = `${months[m]} ${d}, ${y}`;
            
            const list = document.getElementById('modal-meeting-list');
            list.innerHTML = '';
            
            if(registry[key]) {
                registry[key].forEach(ev => {
                    list.innerHTML += `
                        <div class="meeting-card">
                            <div>
                                <div style="font-weight: 800; font-size: 1rem;">${ev.topic}</div>
                                <div style="font-size: 0.8rem; color: #64748b;">${ev.time}</div>
                            </div>
                            <div class="google-sync-chip" onclick="cloudSync('${ev.topic}', '${key}', '${ev.time}')">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" width="14"> SYNC
                            </div>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = `<div style="text-align:center; color:#64748b; font-style:italic;">No dimensional events recorded.</div>`;
            }
            
            document.getElementById('nexus-modal').classList.add('active');
        }

        function closeNexusModal() { document.getElementById('nexus-modal').classList.remove('active'); }

        function launchMeeting() {
            const topic = document.getElementById('mt-name').value;
            const time = document.getElementById('mt-time').value;
            if(!topic || !time) return;

            if(!registry[selectedKey]) registry[selectedKey] = [];
            registry[selectedKey].push({ topic, time });
            
            localStorage.setItem('exo_nexus_events', JSON.stringify(registry));
            renderNexusCal();
            
            // AUTOMATED SYNC INVITATION
            setTimeout(() => {
                if(confirm("Event logged in Nexus! Synchronize to your Global Google Calendar now?")) {
                    cloudSync(topic, selectedKey, time);
                }
            }, 100);
            
            openRegistry(selectedKey);
        }

        function cloudSync(text, key, time) {
            const [y, m, d] = key.split('-');
            const MM = String(Number(m)+1).padStart(2,'0');
            const DD = String(d).padStart(2,'0');
            const T = time.replace(':','');
            const start = `${y}${MM}${DD}T${T}00Z`;
            const end = `${y}${MM}${DD}T${String(Number(time.split(':')[0])+1).padStart(2,'0')}${time.split(':')[1]}00Z`;
            
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(text)}&dates=${start}/${end}&details=Generated via Exo-Pulsar Nexus Hub.`;
            window.open(url, '_blank');
        }

        function updateClock() { document.getElementById('nexus-clock').innerText = new Date().toLocaleTimeString(); }
        function resetSystem() { if(confirm("Initiate total system wipe?")) { localStorage.clear(); location.reload(); } }

        window.onload = initNexus;
    </script>
</body>
</html>
