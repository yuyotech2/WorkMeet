<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exo Pulsar | Nexus Workspace</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400..800&family=Inter:wght@400..800&family=JetBrains+Mono:wght@400..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --neon-blue: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --dark-bg: #0f172a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            overflow: hidden;
            color: #1e293b;
        }

        #particle-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #0f172a;
        }

        .main-container {
            display: flex; width: 100vw; height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 80px; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
            align-items: center; padding: 20px 0; gap: 25px; border-right: 1px solid rgba(255,255,255,0.1);
        }

        .side-icon {
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.5);
        }

        .side-icon.active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .side-icon:hover { color: white; background: rgba(255,255,255,0.1); }

        /* Content Area */
        .content-area { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }

        .top-bar {
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0; z-index: 10;
        }

        /* Whiteboard */
        #whiteboard-container { flex: 1; position: relative; background: #ffffff; }
        #main-canvas { cursor: crosshair; }

        /* Calendar Sidebar (Hidden as Panel) */
        .calendar-panel {
            width: 450px; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-left: 1px solid #e2e8f0; height: 100%; display: flex; flex-direction: column;
            position: absolute; right: -450px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        .calendar-panel.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.1); }

        .cal-header { padding: 30px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        #calendar-grid { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        
        .calendar-day {
            aspect-ratio: 1; border-radius: 12px; border: 1px solid #f1f5f9;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.2s; background: white;
        }
        .calendar-day:hover { background: #f8fafc; border-color: #3b82f6; }
        .calendar-day.today { background: #eff6ff; border: 2px solid #3b82f6; font-weight: 800; }
        
        .meeting-dot {
            width: 6px; height: 6px; background: #3b82f6; border-radius: 50%;
            position: absolute; bottom: 8px;
        }

        /* Schedule Modal */
        #schedule-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: white; width: 400px; padding: 30px; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); z-index: 1000;
            display: none; opacity: 0; transition: 0.3s;
        }
        #schedule-modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .meeting-item {
            font-size: 0.75rem; background: #f1f5f9; padding: 6px 10px; border-radius: 8px;
            margin-top: 5px; display: flex; align-items: center; gap: 8px;
        }
        .sync-btn { cursor: pointer; transition: 0.2s; }
        .sync-btn:hover { transform: scale(1.2); }

        /* Tools Overlay */
        .tool-overlay {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 20px; display: flex; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 50;
        }
        .tool-btn { width: 40px; height: 40px; display:flex; align-items:center; justify-content:center; color: white; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .tool-btn:hover { background: rgba(255,255,255,0.15); }
        .tool-btn.active { background: #3b82f6; }
    </style>
</head>
<body>
    <div id="particle-bg"></div>

    <div class="main-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="side-icon active" title="Whiteboard" onclick="switchTab('draw')">🎨</div>
            <div class="side-icon" title="Global Calendar" onclick="toggleCalendar()">📅</div>
            <div class="side-icon" title="Memory Vault" onclick="switchTab('vault')">🛡️</div>
            <div class="side-icon" title="Clear All" onclick="clearWorkspace()" style="margin-top: auto; color: #ef4444;">🔥</div>
        </nav>

        <section class="content-area">
            <header class="top-bar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="width: 40px; height: 40px; background: #3b82f6; border-radius: 10px; display:flex; align-items:center; justify-content:center; color: white; font-weight: 900;">EP</div>
                    <h2 style="font-weight: 700; letter-spacing: -1px; margin: 0;">EXO-PULSAR <span style="font-weight: 300; color: #64748b;">NEXUS</span></h2>
                </div>
                <div id="digital-clock" style="font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #64748b; background: #f1f5f9; padding: 6px 15px; border-radius: 20px;">00:00:00</div>
            </header>

            <div id="whiteboard-container">
                <canvas id="main-canvas"></canvas>
                
                <div class="tool-overlay">
                    <div class="tool-btn active" id="pen-tool" onclick="setTool('pen')">🖌️</div>
                    <div class="tool-btn" id="eraser-tool" onclick="setTool('eraser')">🧽</div>
                    <div class="tool-btn" onclick="clearCanvas()">🗑️</div>
                    <input type="color" id="color-picker" style="width: 30px; height: 40px; padding: 0; border: none; background: none; cursor: pointer;" value="#3b82f6">
                </div>
            </div>

            <!-- Calendar Side Panel -->
            <div id="calendar-panel" class="calendar-panel">
                <div class="cal-header">
                    <h2 style="margin: 0; font-weight: 800;">Global Schedule</h2>
                    <button onclick="toggleCalendar()" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
                </div>
                <div style="padding: 20px; background: #f8fafc; display: flex; justify-content: space-between; align-items: center;">
                    <h4 id="month-name" style="margin:0;">OCTOBER 2024</h4>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="changeMonth(-1)" style="border-radius: 50%; border: 1px solid #e2e8f0; width: 30px; height: 30px; cursor: pointer;">&lt;</button>
                        <button onclick="changeMonth(1)" style="border-radius: 50%; border: 1px solid #e2e8f0; width: 30px; height: 30px; cursor: pointer;">&gt;</button>
                    </div>
                </div>
                <div id="calendar-grid"></div>
            </div>
        </section>
    </div>

    <!-- Schedule Creator Modal -->
    <div id="schedule-modal">
        <h3 id="modal-date-title" style="margin-top: 0; font-weight: 800;">Oct 14, 2024</h3>
        <p style="color: #64748b; font-size: 0.9rem;">Manage meetings for this neural date.</p>
        
        <div id="meeting-list" style="margin-bottom: 20px; max-height: 200px; overflow-y: auto;">
            <!-- Meetings populated here -->
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
            <input type="text" id="mt-subject" placeholder="Meeting Subject..." style="width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; font-family: inherit;">
            <input type="time" id="mt-time" style="width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; font-family: inherit;">
            <button onclick="saveMeeting()" style="background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;" onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'">Add Neural Meeting</button>
            <button onclick="closeSchedule()" style="background: none; border: none; color: #94a3b8; font-size: 0.8rem; cursor: pointer; font-weight: 700;">Discard</button>
        </div>
    </div>

    <script>
        // --- CORE STATE ---
        let drawing = false;
        let currentTool = 'pen';
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let activeScheduleKey = '';
        let scheduledMeetings = JSON.parse(localStorage.getItem('exo_vault_meetings')) || {};
        let canvas, ctx;

        // --- WHITEBOARD ENGINE ---
        function initWhiteboard() {
            canvas = document.getElementById('main-canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);
            
            // Touch Support
            canvas.addEventListener('touchstart', (e) => startDrawing(e.touches[0]));
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
            canvas.addEventListener('touchend', stopDrawing);
        }

        function resizeCanvas() {
            const container = document.getElementById('whiteboard-container');
            const data = canvas.toDataURL();
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data;
        }

        function startDrawing(e) {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX - canvas.offsetLeft - 80, e.clientY - canvas.offsetTop - 70); // Offset for sidebar/header
        }

        function draw(e) {
            if (!drawing) return;
            ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : document.getElementById('color-picker').value;
            ctx.lineWidth = currentTool === 'eraser' ? 40 : 3;
            ctx.lineCap = 'round';
            ctx.lineTo(e.clientX - canvas.offsetLeft - 80, e.clientY - canvas.offsetTop - 70);
            ctx.stroke();
            saveCanvasToVault();
        }

        function stopDrawing() { drawing = false; }
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tool}-tool`).classList.add('active');
        }
        function clearCanvas() { ctx.clearRect(0,0, canvas.width, canvas.height); saveCanvasToVault(); }

        // --- VAULT PERSISTENCE ---
        function saveCanvasToVault() { localStorage.setItem('exo_vault_canvas', canvas.toDataURL()); }
        function saveToVault() { localStorage.setItem('exo_vault_meetings', JSON.stringify(scheduledMeetings)); }
        function loadFromVault() {
            const savedImg = localStorage.getItem('exo_vault_canvas');
            if(savedImg) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = savedImg;
            }
        }

        // --- CALENDAR ENGINE ---
        function toggleCalendar() { document.getElementById('calendar-panel').classList.toggle('open'); }
        
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
            document.getElementById('month-name').innerText = `${months[currentMonth]} ${currentYear}`;
            
            grid.innerHTML = '';
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
            
            for(let d=1; d<=daysInMonth; d++) {
                const key = `${currentYear}-${currentMonth}-${d}`;
                const hasMeeting = scheduledMeetings[key] && scheduledMeetings[key].length > 0;
                const isToday = (d === new Date().getDate() && currentMonth === new Date().getMonth() && currentYear === new Date().getFullYear());
                
                grid.innerHTML += `
                    <div class="calendar-day ${isToday ? 'today' : ''}" onclick="openSchedule('${key}')">
                        ${d}
                        ${hasMeeting ? '<div class="meeting-dot"></div>' : ''}
                    </div>
                `;
            }
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function openSchedule(key) {
            activeScheduleKey = key;
            const [y, m, d] = key.split('-');
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('modal-date-title').innerText = `${months[m]} ${d}, ${y}`;
            
            const list = document.getElementById('meeting-list');
            list.innerHTML = '';
            const meetings = scheduledMeetings[key] || [];
            
            meetings.forEach((m, idx) => {
                list.innerHTML += `
                    <div class="meeting-item">
                        <span class="sync-btn" onclick="syncToGoogleLive('${m.subject}', '${key}', '${m.time}')" title="Sync to REAL Google Calendar">📅</span>
                        <b>${m.time}</b> ${m.subject}
                    </div>
                `;
            });
            
            document.getElementById('schedule-modal').classList.add('active');
        }

        function closeSchedule() { 
            document.getElementById('schedule-modal').classList.remove('active');
            document.getElementById('mt-subject').value = '';
        }

        function saveMeeting() {
            const subject = document.getElementById('mt-subject').value;
            const time = document.getElementById('mt-time').value;
            if(!subject || !time) return alert("Missing info.");
            
            if(!scheduledMeetings[activeScheduleKey]) scheduledMeetings[activeScheduleKey] = [];
            scheduledMeetings[activeScheduleKey].push({ subject, time });
            
            saveToVault();
            renderCalendar();
            
            // TRIGGER THE LIVE SYNC PROMPT
            setTimeout(() => {
                if(confirm("Saved to Dashboard! Sync this to your ACTUAL Google Calendar app now?")) {
                    syncToGoogleLive(subject, activeScheduleKey, time);
                }
            }, 100);
            
            openSchedule(activeScheduleKey); // Refresh list
        }

        // --- TRASPARENT SYNC ENGINE ---
        function syncToGoogleLive(subject, key, time) {
            const [year, month, day] = key.split('-');
            const mStr = String(Number(month) + 1).padStart(2, '0');
            const dStr = String(day).padStart(2, '0');
            const timeClean = time.replace(':', '');
            
            const startStr = `${year}${mStr}${dStr}T${timeClean}00Z`;
            const endStr = `${year}${mStr}${dStr}T${String(Number(time.split(':')[0]) + 1).padStart(2, '0')}${time.split(':')[1]}00Z`;
            
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(subject)}&dates=${startStr}/${endStr}&details=Sent via Exo-Pulsar Nexus`;
            window.open(url, '_blank');
        }

        function clearWorkspace() {
            if(confirm("Destroy entire Neural Workspace? This cannot be undone!")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function updateClock() {
            const n = new Date();
            document.getElementById('digital-clock').innerText = n.toLocaleTimeString();
        }

        function initParticles(type) {
            const container = document.getElementById('particle-bg');
            container.innerHTML = '';
            // Basic space/vortex background logic
            container.style.background = 'radial-gradient(circle at center, #1e293b 0%, #0f172a 100%)';
        }

        // --- BOOT UP ---
        window.onload = () => {
            initWhiteboard();
            loadFromVault();
            renderCalendar();
            initParticles('Space');
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
