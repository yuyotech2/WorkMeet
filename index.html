<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exo-Pulsar | The Universal Classroom Portal</title>
    <meta name="description" content="Entry portal for Exo-Pulsar, the elite classroom hub for synchronized learning and professional collaboration.">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- BACKGROUND HUD -->
    <canvas id="stars"></canvas>
    <div class="grid-bg"></div>

    <main class="portal-container">
        <!-- LOGO HUD -->
        <div class="logo-hud">
            <img src="assets/logo.png" alt="Exo Logo" class="logo-image">
            <div>
                <span class="version-pill">v4.5 - STABLE RELEASE</span>
            </div>
        </div>

        <!-- ENTRY PORTAL -->
        <section class="entry-portal">
            <h1 class="portal-title">Classroom Portal</h1>
            <p class="portal-subtitle">Enter your room coordinates to join the session.</p>

            <div class="input-group">
                <div>
                    <label class="input-label">MISSION TARGET (ROOM NAME)</label>
                    <input type="text" id="join-room-name" class="portal-input" placeholder="e.g. Physics 101, Marketing Sync..." autofocus>
                </div>
                
                <div>
                    <label class="input-label">YOUR CALLSIGN (USERNAME)</label>
                    <input type="text" id="join-user-name" class="portal-input" placeholder="Enter your name...">
                </div>

                <button class="btn-launch" onclick="launchMission()">Blast Off 🚀</button>
            </div>
        </section>

        <footer class="portal-footer">
            &copy; 2026 EXO-PULSAR COMMAND. READY FOR DEPLOYMENT.
        </footer>
    </main>

    <script>
        // --- STAR FIELD ENGINE ---
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, ' + (Math.random() * 0.5 + 0.5) + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push(new Star());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.update();
                s.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); initStars(); });
        resize();
        initStars();
        animate();

        // --- LAUNCH LOGIC ---
        function launchMission() {
            const room = document.getElementById('join-room-name').value || 'Private Room';
            const user = document.getElementById('join-user-name').value || 'Guest';
            
            // Save user name locally for the dashboard to pick up
            localStorage.setItem('exo_username', user);
            
            window.location.href = `dashboard.html?room=${encodeURIComponent(room)}`;
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') launchMission();
        });
    </script>
</body>
</html>
